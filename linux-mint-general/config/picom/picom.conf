# Shadows
shadow          = true;
shadow-radius   = 10;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity  = 0.45;
shadow-exclude  = [
    "name      = 'Notification'",
    "class_g   = 'Conky'",
    "class_g  ?= 'Notify-osd'",
    "class_g   = 'Cairo-clock'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading       = true;
fade-in-step  = 0.04;
fade-out-step = 0.04;
fade-delta    = 4;

# Transparency / opacity
inactive-opacity          = 0.90;
active-opacity            = 1.0;
frame-opacity             = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "90:class_g = 'kitty' && !focused"
];

focus-exclude = [
    "class_g = 'Cairo-clock'"
];

# Background blur
blur-method          = "dual_kawase";
blur-strength        = 4;
blur-background      = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "_GTK_FRAME_EXTENTS@:c"
];

# Rendering
# backend = "xrender";  ← fallback for machines without a dedicated GPU
backend     = "glx";
vsync       = true;
use-damage  = false;

glx-no-stencil       = true;
glx-copy-from-front  = false;

wintypes: {
    tooltip      = { fade = true; shadow = false; opacity = 0.9; focus = true; };
    dock         = { shadow = false; clip-shadow-above = true; };
    dnd          = { shadow = false; };
    popup_menu   = { opacity = 0.92; };
    dropdown_menu = { opacity = 0.92; };
};
