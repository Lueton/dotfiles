; Pywal color palette — generated by 'wallpaper' command
include-file = ~/.cache/wal/colors-polybar.ini

[bar/main]
width    = 100%
height   = 32
radius   = 0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size  = 2
line-color = ${colors.color2}

border-size = 0

padding-left  = 2
padding-right = 2
module-margin-left  = 1
module-margin-right = 1

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=16;4"

modules-left   = i3 xwindow
modules-center = date
modules-right  = cpu memory network-wired network-wireless pulseaudio

tray-position   = right
tray-padding    = 4
tray-background = ${colors.background}

cursor-click  = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-mode-padding    = 2
label-mode-foreground = ${colors.foreground}
label-mode-background = ${colors.color1}

label-focused            = %name%
label-focused-background = ${colors.color2}
label-focused-foreground = ${colors.foreground}
label-focused-padding    = 2

label-unfocused            = %name%
label-unfocused-foreground = ${colors.color5}
label-unfocused-padding    = 2

label-visible            = %name%
label-visible-background = ${colors.color0}
label-visible-padding    = 2

label-urgent            = %name%
label-urgent-background = ${colors.color1}
label-urgent-padding    = 2

[module/xwindow]
type             = internal/xwindow
label            = %title:0:60:...%
label-foreground = ${colors.foreground}

[module/date]
type     = internal/date
interval = 1
date     = "%a %d %b"
time     = "%H:%M"
label    = " %date%  %time%"

[module/cpu]
type     = internal/cpu
interval = 2
format-prefix            = " "
format-prefix-foreground = ${colors.color2}
label = %percentage:2%%

[module/memory]
type     = internal/memory
interval = 2
format-prefix            = " "
format-prefix-foreground = ${colors.color4}
label = %percentage_used:2%%

[module/network-wireless]
type           = internal/network
interface-type = wireless
interval       = 3.0

format-connected-prefix            = "󰤨 "
format-connected-prefix-foreground = ${colors.color6}
label-connected = %essid%

format-disconnected-prefix            = "󰤭 "
format-disconnected-prefix-foreground = ${colors.color1}
label-disconnected = offline

[module/network-wired]
type           = internal/network
interface-type = wired
interval       = 3.0

format-connected-prefix            = "󰈀 "
format-connected-prefix-foreground = ${colors.color6}
label-connected = %linkspeed%

format-disconnected = ""

[module/pulseaudio]
type         = internal/pulseaudio
use-ui-max   = true
interval     = 5

format-volume-prefix            = "󰕾 "
format-volume-prefix-foreground = ${colors.color3}
format-volume = <label-volume>
label-volume  = %percentage%%

format-muted-prefix            = "󰖁 "
format-muted-prefix-foreground = ${colors.color1}
label-muted = muted
